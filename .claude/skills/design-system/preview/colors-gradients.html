<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="hx" style="margin:0;padding:18px;background:#fff">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
  <div style="background:linear-gradient(135deg,#400A20,#1A0410);color:#fff;border-radius:2px;padding:14px;height:130px;display:flex;flex-direction:column;justify-content:space-between"><div style="font:300 18px/1 var(--font-sans);letter-spacing:-0.02em">Burgundy</div><div style="font:400 10px/1.4 var(--font-mono);opacity:.85">--grad-burgundy</div></div>
  <div style="background:linear-gradient(135deg,#01514E,#002423);color:#fff;border-radius:2px;padding:14px;height:130px;display:flex;flex-direction:column;justify-content:space-between"><div style="font:300 18px/1 var(--font-sans);letter-spacing:-0.02em">Forest</div><div style="font:400 10px/1.4 var(--font-mono);opacity:.85">--grad-forest</div></div>
  <div style="background:linear-gradient(180deg,#1D2935,#0F1924);color:#fff;border-radius:2px;padding:14px;height:130px;display:flex;flex-direction:column;justify-content:space-between"><div style="font:300 18px/1 var(--font-sans);letter-spacing:-0.02em">Ink</div><div style="font:400 10px/1.4 var(--font-mono);opacity:.85">--grad-ink</div></div>
  <div style="background:linear-gradient(135deg,#4E70F8,#2A3FBE);color:#fff;border-radius:2px;padding:14px;height:130px;display:flex;flex-direction:column;justify-content:space-between"><div style="font:300 18px/1 var(--font-sans);letter-spacing:-0.02em">Cerulean</div><div style="font:400 10px/1.4 var(--font-mono);opacity:.85">--grad-cerulean</div></div>
</div>
</body></html>
