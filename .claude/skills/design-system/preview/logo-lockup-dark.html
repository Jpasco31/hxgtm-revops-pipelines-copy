<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Logo lockup — dark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--color-ink, #111923);
    color: #FFFFFF;
    font-family: var(--font-sans);
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 56px 72px;
    box-sizing: border-box;
    gap: 48px;
  }
  header { display: flex; justify-content: space-between; align-items: baseline; }
  .label { font: 500 11px/1 var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
  .meta  { font: 400 11px/1.5 var(--font-mono); color: rgba(255,255,255,0.45); }

  .stage { display: grid; gap: 40px; align-content: center; }
  .lockup-row {
    display: flex;
    align-items: center;
    gap: 32px;
    padding: 56px 64px;
    border: 1px dashed rgba(198, 242, 63, 0.45);
    border-radius: 6px;
  }
  .lockup-row .mark svg, .lockup-row .mark img { display: block; height: 88px; width: auto; }
  .lockup-row .word svg, .lockup-row .word img { display: block; height: 64px; width: auto; }
  .row-tag { margin-left: auto; font: 500 10px/1 var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.55); }

  .row-1 .mark { filter: invert(100%); }
  .row-1 .word { filter: invert(100%); }

  .row-2 { background: var(--color-wine-700, #5A1530); border-color: rgba(255,255,255,0.35); }
  .row-2 .mark { filter: invert(100%); }
  .row-2 .word { filter: invert(100%); }

  footer { display: flex; justify-content: space-between; align-items: baseline; }
</style>
</head>
<body>
  <header>
    <div class="label">Logo lockup · dark theme</div>
    <div class="meta">hyperexponential — Brand v0.1</div>
  </header>

  <section class="stage">
    <div class="lockup-row row-1">
      <div class="mark"><img src="../assets/logo/hx-logomark.svg" alt=""></div>
      <div class="word"><img src="../assets/logo/hx-wordmark.svg" alt=""></div>
      <div class="row-tag">Reverse · white on ink</div>
    </div>

    <div class="lockup-row row-2">
      <div class="mark"><img src="../assets/logo/hx-logomark.svg" alt=""></div>
      <div class="word"><img src="../assets/logo/hx-wordmark.svg" alt=""></div>
      <div class="row-tag">On wine</div>
    </div>
  </section>

  <footer>
    <div class="meta">Use the reverse mark on any ink, wine, or photographic dark surface.</div>
    <div class="meta">Maintain ≥ 1× cap-height clearspace.</div>
  </footer>
</body>
</html>
