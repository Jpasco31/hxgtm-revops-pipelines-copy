<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="hx" style="margin:0;padding:18px;background:#fff">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
  <div style="background:#1C2733;color:#fff;border-radius:2px;padding:14px 16px;height:120px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="font:400 22px/1 var(--font-sans);letter-spacing:-0.02em">Ink</div>
    <div style="font:400 11px/1.5 var(--font-sans);opacity:.85">#1C2733<br>--ink • dk1 / primary text</div>
  </div>
  <div style="background:#01514F;color:#fff;border-radius:2px;padding:14px 16px;height:120px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="font:400 22px/1 var(--font-sans);letter-spacing:-0.02em">Forest</div>
    <div style="font:400 11px/1.5 var(--font-sans);opacity:.85">#01514F<br>--forest • dk2 / deep accent</div>
  </div>
  <div style="background:#3F0A20;color:#fff;border-radius:2px;padding:14px 16px;height:120px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="font:400 22px/1 var(--font-sans);letter-spacing:-0.02em">Wine</div>
    <div style="font:400 11px/1.5 var(--font-sans);opacity:.85">#3F0A20<br>--wine • accent5 / sparingly</div>
  </div>
</div>
</body></html>
