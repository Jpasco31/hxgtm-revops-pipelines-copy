<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkedIn partnership card</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #101820;
    }

    body {
      display: grid;
      place-items: center;
    }

    .card {
      position: relative;
      width: 1200px;
      height: 675px;
      overflow: hidden;
      color: #ffffff;
      background:
        url("{{BACKGROUND_DATA_URI}}") center/cover no-repeat,
        #14202e;
    }

    .logo-lockup {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 50.12px;
      height: 180px;
      margin: auto;
    }

    .logo-panel {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .hx-logo svg {
      display: block;
      height: 45.48px;
      width: auto;
      max-width: 480px;
      color: #ffffff;
    }

    .divider {
      position: relative;
      width: 34.96px;
      height: 33.32px;
      justify-self: center;
    }

    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      background: #ffffff;
    }

    .divider::before {
      left: 50%;
      top: 0;
      width: 1.67px;
      height: 100%;
      transform: translateX(-50%);
    }

    .divider::after {
      top: 50%;
      left: 0;
      width: 100%;
      height: 1.67px;
      transform: translateY(-50%);
    }

    .partner-logo {
      --partner-max-w: 480px;
      --partner-max-h: 45px;
      display: block;
      width: auto;
      height: auto;
      max-width: var(--partner-max-w);
      max-height: var(--partner-max-h);
      object-fit: contain;
    }
  </style>
</head>
